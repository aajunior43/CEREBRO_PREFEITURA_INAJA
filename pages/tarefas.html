<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0" />
    <title>Tarefas Kanban – Prefeitura de Inajá</title>
    <link rel="stylesheet" href="/static/css/index.css" />
    <script>(function(){var t=localStorage.getItem('theme');if(t&&t!=='light')document.documentElement.setAttribute('data-theme',t);}());</script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet" />
    <style>
        /* ── PAGE ── */
        .kb-page {
            min-height: calc(100vh - 64px);
            padding: 20px 16px 60px;
            background: var(--bg)

        /* ── HERO ── */
        .kb-hero {
            display: flex;
            align-items: center;
            gap: 14px;
            max-width: 1100px;
            margin: 0 auto 18px
        }

        .kb-hero-icon {
            width: 48px;
            height: 48px;
            flex-shrink: 0;
            background: linear-gradient(135deg, #06b6d4, #7c3aed);
            border-radius: 13px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 2px 2px 10px rgba(6, 182, 212, .3)
        }

        .kb-hero h2 {
            font-size: clamp(17px, 4vw, 22px);
            font-weight: 800;
            color: var(--text);
            margin: 0
        }

        .kb-hero p {
            font-size: 12px;
            color: var(--text-3);
            margin: 2px 0 0
        }

        /* ── TOOLBAR ── */
        .kb-toolbar {
            max-width: 1100px;
            margin: 0 auto 18px;
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            align-items: center
        }

        .kb-btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 10px 16px;
            border-radius: var(--radius-sm);
            border: none;
            cursor: pointer;
            font-family: inherit;
            font-size: 13px;
            font-weight: 700;
            transition: all .15s;
            min-height: 40px;
            white-space: nowrap
        }

        .kb-btn-cyan {
            background: linear-gradient(135deg, #06b6d4, #0891b2);
            color: #fff;
            box-shadow: 2px 2px 8px rgba(6, 182, 212, .4)
        }

        .kb-btn-cyan:hover {
            box-shadow: 3px 3px 12px rgba(6, 182, 212, .5);
            transform: translateY(-1px)
        }

        .kb-btn-violet {
            background: linear-gradient(135deg, #7c3aed, #6d28d9);
            color: #fff;
            box-shadow: 2px 2px 8px rgba(124, 58, 237, .4)
        }

        .kb-btn-violet:hover {
            box-shadow: 3px 3px 12px rgba(124, 58, 237, .5);
            transform: translateY(-1px)
        }

        .kb-btn-emerald {
            background: linear-gradient(135deg, #10b981, #059669);
            color: #fff;
            box-shadow: 2px 2px 8px rgba(16, 185, 129, .4)
        }

        .kb-btn-emerald:hover {
            box-shadow: 3px 3px 12px rgba(16, 185, 129, .5);
            transform: translateY(-1px)
        }

        .kb-btn-ghost {
            background: var(--bg);
            color: var(--text-2);
            box-shadow: var(--neo-sm)
        }

        .kb-btn-ghost:hover {
            box-shadow: var(--neo);
            color: var(--text)
        }

        .kb-stats {
            margin-left: auto;
            display: flex;
            gap: 10px;
            font-size: 12px
        }

        .kb-stat {
            background: var(--bg);
            border-radius: var(--radius-sm);
            padding: 6px 12px;
            box-shadow: var(--neo-sm);
            text-align: center
        }

        .kb-stat-v {
            font-weight: 800;
            font-size: 16px
        }

        .kb-stat-l {
            color: var(--text-3);
            font-size: 10px
        }

        /* ── COLUMNS ── */
        .kb-grid {
            max-width: 1100px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 16px
        }

        @media(max-width:700px) {
            .kb-grid {
                grid-template-columns: 1fr
            }

            .kb-stats {
                display: none
            }
        }

        .kb-col {
            border-radius: var(--radius);
            box-shadow: var(--neo);
            overflow: hidden;
            background: var(--bg);
            display: flex;
            flex-direction: column;
            min-height: 300px
        }

        .kb-col-head {
            padding: 14px 16px;
            border-bottom: 1px solid rgba(0, 0, 0, .07);
            display: flex;
            align-items: center;
            justify-content: space-between
        }

        .kb-col-title {
            font-size: 14px;
            font-weight: 800;
            color: var(--text)
        }

        .kb-col-badge {
            font-size: 11px;
            font-weight: 700;
            padding: 3px 9px;
            border-radius: 20px;
            background: rgba(0, 0, 0, .07);
            color: var(--text-3)
        }

        .kb-col-todo .kb-col-head {
            border-top: 3px solid #06b6d4
        }

        .kb-col-progress .kb-col-head {
            border-top: 3px solid #f59e0b
        }

        .kb-col-done .kb-col-head {
            border-top: 3px solid #10b981
        }

        .kb-col-body {
            flex: 1;
            padding: 12px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            min-height: 80px
        }

        .kb-col-body.drag-over {
            background: rgba(6, 182, 212, .04)
        }

        .kb-empty {
            text-align: center;
            color: var(--text-3);
            font-size: 12px;
            padding: 20px;
            opacity: .6
        }

        /* ── CARDS ── */
        .kb-card {
            background: var(--bg);
            border-radius: var(--radius-sm);
            padding: 13px;
            border-left: 4px solid transparent;
            box-shadow: var(--neo-sm);
            cursor: grab;
            transition: all .15s;
            user-select: none;
            position: relative
        }

        .kb-card:hover {
            box-shadow: var(--neo);
            transform: translateY(-1px)
        }

        .kb-card.dragging {
            opacity: .55;
            transform: scale(1.02);
            box-shadow: 0 8px 30px rgba(0, 0, 0, .18);
            cursor: grabbing
        }

        .kb-card.drag-ghost {
            opacity: .3
        }

        .kb-card-top {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 8px;
            margin-bottom: 4px
        }

        .kb-card-title {
            font-size: 13px;
            font-weight: 700;
            color: var(--text);
            line-height: 1.4;
            flex: 1
        }

        .kb-card-desc {
            font-size: 12px;
            color: var(--text-3);
            line-height: 1.5;
            margin-bottom: 6px
        }

        .kb-card-foot {
            display: flex;
            align-items: center;
            justify-content: space-between
        }

        .kb-priority {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            font-size: 10px;
            font-weight: 700;
            padding: 2px 7px;
            border-radius: 20px
        }

        .kb-prio-high {
            background: rgba(239, 68, 68, .12);
            color: #dc2626
        }

        .kb-prio-medium {
            background: rgba(245, 158, 11, .12);
            color: #d97706
        }

        .kb-prio-low {
            background: rgba(16, 185, 129, .12);
            color: #059669
        }

        .kb-card-actions {
            display: flex;
            gap: 4px
        }

        .kb-icon-btn {
            background: none;
            border: none;
            cursor: pointer;
            padding: 4px;
            border-radius: 5px;
            font-size: 14px;
            opacity: .5;
            transition: opacity .15s;
            line-height: 1
        }

        .kb-icon-btn:hover {
            opacity: 1;
            background: rgba(0, 0, 0, .06)
        }

        /* ── BORDER COLOR BY PRIORITY ── */
        .kb-prio-border-high {
            border-left-color: #ef4444
        }

        .kb-prio-border-medium {
            border-left-color: #f59e0b
        }

        .kb-prio-border-low {
            border-left-color: #10b981
        }

        /* ── MODAL ── */
        .kb-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            width: 100vw; height: 100vh;
            background: rgba(0, 0, 0, .45);
            z-index: 5000;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px
        }

        .kb-modal {
            background: var(--bg);
            border-radius: var(--radius);
            box-shadow: 0 8px 40px rgba(0, 0, 0, .22);
            width: 100%;
            max-width: 480px;
            overflow: hidden
        }

        .kb-modal-head {
            padding: 18px 20px 14px;
            border-bottom: 1px solid rgba(0, 0, 0, .07);
            display: flex;
            justify-content: space-between;
            align-items: center
        }

        .kb-modal-head h3 {
            font-size: 16px;
            font-weight: 800;
            margin: 0;
            color: var(--text)
        }

        .kb-close {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 20px;
            color: var(--text-3);
            line-height: 1
        }

        .kb-modal-body {
            padding: 16px 20px;
            display: flex;
            flex-direction: column;
            gap: 14px
        }

        .kb-modal-foot {
            padding: 12px 20px;
            border-top: 1px solid rgba(0, 0, 0, .07);
            display: flex;
            gap: 8px;
            justify-content: flex-end
        }

        .kb-label {
            display: block;
            font-size: 12px;
            font-weight: 700;
            color: var(--text-2);
            margin-bottom: 5px
        }

        .kb-input,
        .kb-textarea,
        .kb-select {
            width: 100%;
            padding: 9px 11px;
            border: 1px solid rgba(0, 0, 0, .12);
            border-radius: 7px;
            font-family: inherit;
            font-size: 13px;
            background: var(--bg);
            color: var(--text);
            outline: none;
            box-sizing: border-box;
            transition: border-color .15s
        }

        .kb-input:focus,
        .kb-textarea:focus,
        .kb-select:focus {
            border-color: #06b6d4;
            box-shadow: 0 0 0 3px rgba(6, 182, 212, .1)
        }

        .kb-textarea {
            min-height: 80px;
            resize: vertical
        }

        /* ── CONFIRM MODAL ── */
        .kb-confirm-modal {
            max-width: 380px
        }

        .kb-confirm-msg {
            font-size: 13px;
            color: var(--text-2);
            line-height: 1.6
        }

        /* ── BACKUP HISTORY ── */
        .kb-hist {
            max-width: 1100px;
            margin: 20px auto 0
        }

        .kb-hist-head {
            font-size: 13px;
            font-weight: 700;
            color: var(--text-2);
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 6px
        }

        .kb-hist-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 8px
        }

        .kb-hist-item {
            background: var(--bg);
            border-radius: var(--radius-sm);
            box-shadow: var(--neo-sm);
            padding: 10px 13px;
            font-size: 12px
        }

        .kb-hist-ts {
            font-weight: 600;
            color: var(--text);
            font-size: 11px
        }

        .kb-hist-meta {
            color: var(--text-3);
            font-size: 10px;
            margin-top: 2px
        }

        /* ── TOAST ── */
        #kb-toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 9999;
            display: none;
            padding: 12px 20px;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            color: #fff;
            box-shadow: 0 4px 16px rgba(0, 0, 0, .25);
            max-width: 90vw;
            text-align: center;
            transition: opacity .3s
        }

        /* ── ENCRYPT BADGE ── */
        .kb-enc-on {
            background: rgba(124, 58, 237, .12);
            color: #7c3aed;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 700;
            cursor: pointer;
            border: none;
            font-family: inherit
        }

        .kb-enc-off {
            background: rgba(0, 0, 0, .07);
            color: var(--text-3);
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 700;
            cursor: pointer;
            border: none;
            font-family: inherit
        }

        @keyframes spin {
            to {
                transform: rotate(360deg)
            }
        }

        .spin {
            display: inline-block;
            animation: spin .7s linear infinite
        }
    </style>
  <script src="/static/js/shared-header.js"></script>
</head>

<body>

    <div class="kb-page">
        <!-- Hero -->
        <div class="kb-hero">
            <div class="kb-hero-icon"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white"
                    stroke-width="2">
                    <rect x="3" y="3" width="7" height="7" />
                    <rect x="14" y="3" width="7" height="7" />
                    <rect x="14" y="14" width="7" height="7" />
                    <rect x="3" y="14" width="7" height="7" />
                </svg></div>
            <div>
                <h2>Tarefas • Kanban</h2>
                <p>Organize seu dia com arrastar e soltar · Prioridades · Dados salvos no servidor</p>
            </div>
        </div>

        <!-- Toolbar -->
        <div class="kb-toolbar">
            <button class="kb-btn kb-btn-cyan" onclick="openTaskModal()">➕ Nova Tarefa</button>
            <div class="kb-stats">
                <div class="kb-stat">
                    <div class="kb-stat-v" id="st-todo" style="color:#06b6d4">0</div>
                    <div class="kb-stat-l">A Fazer</div>
                </div>
                <div class="kb-stat">
                    <div class="kb-stat-v" id="st-prog" style="color:#f59e0b">0</div>
                    <div class="kb-stat-l">Em Progresso</div>
                </div>
                <div class="kb-stat">
                    <div class="kb-stat-v" id="st-done" style="color:#10b981">0</div>
                    <div class="kb-stat-l">Concluídas</div>
                </div>
            </div>
        </div>

        <!-- Board -->
        <div class="kb-grid" id="kb-grid">
            <div class="kb-col kb-col-todo" id="col-todo">
                <div class="kb-col-head"><span class="kb-col-title">📋 A Fazer</span><span class="kb-col-badge"
                        id="badge-todo">0</span></div>
                <div class="kb-col-body" id="body-todo" ondragover="onColDragOver(event,'todo')"
                    ondragleave="onColDragLeave(event,'todo')" ondrop="onColDrop(event,'todo')"></div>
            </div>
            <div class="kb-col kb-col-progress" id="col-in-progress">
                <div class="kb-col-head"><span class="kb-col-title">⚡ Em Progresso</span><span class="kb-col-badge"
                        id="badge-in-progress">0</span></div>
                <div class="kb-col-body" id="body-in-progress" ondragover="onColDragOver(event,'in-progress')"
                    ondragleave="onColDragLeave(event,'in-progress')" ondrop="onColDrop(event,'in-progress')"></div>
            </div>
            <div class="kb-col kb-col-done" id="col-done">
                <div class="kb-col-head"><span class="kb-col-title">✅ Concluído</span><span class="kb-col-badge"
                        id="badge-done">0</span></div>
                <div class="kb-col-body" id="body-done" ondragover="onColDragOver(event,'done')"
                    ondragleave="onColDragLeave(event,'done')" ondrop="onColDrop(event,'done')"></div>
            </div>
        </div>

        </div>
    </div>

    <!-- Task Modal -->
    <div class="kb-overlay" id="task-modal" style="display:none" onclick="if(event.target===this)closeTaskModal()">
        <div class="kb-modal">
            <div class="kb-modal-head">
                <h3 id="modal-title">✏️ Nova Tarefa</h3><button class="kb-close" onclick="closeTaskModal()">✕</button>
            </div>
            <div class="kb-modal-body">
                <div><label class="kb-label">Título *</label><input class="kb-input" id="t-title"
                        placeholder="Ex: Revisar relatório mensal" /></div>
                <div><label class="kb-label">Descrição</label><textarea class="kb-textarea" id="t-desc"
                        placeholder="Detalhes opcionais…"></textarea></div>
                <div style="display:flex;gap:12px">
                    <div style="flex:1"><label class="kb-label">Status</label>
                        <select class="kb-select" id="t-status">
                            <option value="todo">A Fazer</option>
                            <option value="in-progress">Em Progresso</option>
                            <option value="done">Concluído</option>
                        </select>
                    </div>
                    <div style="flex:1"><label class="kb-label">Prioridade</label>
                        <select class="kb-select" id="t-prio">
                            <option value="high">🔴 Alta</option>
                            <option value="medium" selected>🟡 Média</option>
                            <option value="low">🟢 Baixa</option>
                        </select>
                    </div>
                </div>
            </div>
            <div class="kb-modal-foot">
                <button class="kb-btn kb-btn-ghost" onclick="closeTaskModal()">Cancelar</button>
                <button class="kb-btn kb-btn-cyan" id="modal-save-btn" onclick="saveTask()">Salvar</button>
            </div>
        </div>
    </div>

    <!-- Confirm Delete Modal -->
    <div class="kb-overlay" id="confirm-modal" style="display:none">
        <div class="kb-modal kb-confirm-modal">
            <div class="kb-modal-head">
                <h3>⚠️ Confirmar exclusão</h3><button class="kb-close" onclick="closeConfirm()">✕</button>
            </div>
            <div class="kb-modal-body">
                <p class="kb-confirm-msg">Tem certeza que deseja excluir esta tarefa? Esta ação não pode ser desfeita.
                </p>
            </div>
            <div class="kb-modal-foot">
                <button class="kb-btn kb-btn-ghost" onclick="closeConfirm()">Cancelar</button>
                <button class="kb-btn" style="background:#ef4444;color:#fff" onclick="executeDelete()">🗑
                    Excluir</button>
            </div>
        </div>
    </div>

    <div id="kb-toast"></div>

    <script>
  // Theme
  (function() {
    const saved = localStorage.getItem('theme') || 'light';
    if (saved === 'dark') document.documentElement.setAttribute('data-theme', 'dark');
  })();
        // ── STATE ──────────────────────────────────────────────────────────────────
        let tasks = [];
        let editingId = null;
        let deletingId = null;
        let dragTaskId = null;

        // ── INIT ───────────────────────────────────────────────────────────────────
        async function loadAll() {
            try {
                const res = await fetch('/api/kanban');
                tasks = await res.json();
            } catch (e) { tasks = []; showToast('Erro ao carregar tarefas', 'error'); }
            renderBoard();
        }

        loadAll();

        // ── RENDER ─────────────────────────────────────────────────────────────────
        function renderBoard() {
            const cols = ['todo', 'in-progress', 'done'];
            const prioOrder = { high: 3, medium: 2, low: 1 };
            cols.forEach(col => {
                const body = document.getElementById(`body-${col}`);
                const colTasks = tasks.filter(t => t.status === col).sort((a, b) => prioOrder[b.priority] - prioOrder[a.priority]);
                document.getElementById(`badge-${col}`).textContent = colTasks.length;
                body.innerHTML = '';
                if (!colTasks.length) {
                    body.innerHTML = '<div class="kb-empty">Nenhuma tarefa aqui.<br>Arraste uma card ou crie uma nova.</div>';
                }
                colTasks.forEach(task => {
                    const card = createCard(task);
                    body.appendChild(card);
                });
            });
            updateStats();
        }

        function createCard(task) {
            const card = document.createElement('div');
            card.className = `kb-card kb-prio-border-${task.priority}`;
            card.draggable = true;
            card.dataset.id = task.id;
            const prioLabel = { high: '🔴 Alta', medium: '🟡 Média', low: '🟢 Baixa' };
            const prioClass = { high: 'kb-prio-high', medium: 'kb-prio-medium', low: 'kb-prio-low' };
            card.innerHTML = `
      <div class="kb-card-top">
        <div class="kb-card-title">${esc(task.title)}</div>
        <div class="kb-card-actions">
          <button class="kb-icon-btn" onclick="openEdit('${task.id}')" title="Editar">✏️</button>
          <button class="kb-icon-btn" style="color:#ef4444" onclick="confirmDelete('${task.id}')" title="Excluir">🗑</button>
        </div>
      </div>
      ${task.description ? `<div class="kb-card-desc">${esc(task.description)}</div>` : ''}
      <div class="kb-card-foot">
        <span class="kb-priority ${prioClass[task.priority]}">${prioLabel[task.priority]}</span>
      </div>`;
            card.addEventListener('dragstart', e => { dragTaskId = task.id; card.classList.add('dragging'); e.dataTransfer.effectAllowed = 'move'; });
            card.addEventListener('dragend', () => { dragTaskId = null; card.classList.remove('dragging'); document.querySelectorAll('.kb-col-body').forEach(b => b.classList.remove('drag-over')); });
            return card;
        }

        function updateStats() {
            ['todo', 'in-progress', 'done'].forEach(col => {
                const ids = { todo: 'st-todo', 'in-progress': 'st-prog', done: 'st-done' };
                document.getElementById(ids[col]).textContent = tasks.filter(t => t.status === col).length;
            });
        }

        // ── DRAG & DROP ────────────────────────────────────────────────────────────
        function onColDragOver(e, col) {
            e.preventDefault(); e.dataTransfer.dropEffect = 'move';
            document.getElementById(`body-${col}`).classList.add('drag-over');
        }
        function onColDragLeave(e, col) { document.getElementById(`body-${col}`).classList.remove('drag-over'); }
        async function onColDrop(e, col) {
            e.preventDefault();
            document.getElementById(`body-${col}`).classList.remove('drag-over');
            if (!dragTaskId) return;
            const task = tasks.find(t => t.id === dragTaskId);
            if (task && task.status !== col) {
                task.status = col;
                try {
                    await fetch(`/api/kanban/${task.id}`, { method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(task) });
                    showToast(`Tarefa movida para "${colName(col)}"`, 'success');
                } catch (e) { showToast('Erro ao mover tarefa', 'error'); }
                renderBoard();
            }
        }
        function colName(c) { return { todo: 'A Fazer', 'in-progress': 'Em Progresso', done: 'Concluído' }[c] || c; }

        // ── CRUD ───────────────────────────────────────────────────────────────────
        function openTaskModal() { editingId = null; document.getElementById('modal-title').textContent = '✏️ Nova Tarefa'; document.getElementById('t-title').value = ''; document.getElementById('t-desc').value = ''; document.getElementById('t-status').value = 'todo'; document.getElementById('t-prio').value = 'medium'; document.getElementById('task-modal').style.display = 'flex'; setTimeout(() => document.getElementById('t-title').focus(), 100); }
        function closeTaskModal() { document.getElementById('task-modal').style.display = 'none'; editingId = null; }

        function openEdit(id) {
            const task = tasks.find(t => t.id === id); if (!task) return;
            editingId = id;
            document.getElementById('modal-title').textContent = '✏️ Editar Tarefa';
            document.getElementById('t-title').value = task.title;
            document.getElementById('t-desc').value = task.description || '';
            document.getElementById('t-status').value = task.status;
            document.getElementById('t-prio').value = task.priority;
            document.getElementById('task-modal').style.display = 'flex';
            setTimeout(() => document.getElementById('t-title').focus(), 100);
        }

        async function saveTask() {
            const title = document.getElementById('t-title').value.trim();
            if (!title) { showToast('O título é obrigatório', 'error'); return; }
            const desc = document.getElementById('t-desc').value.trim();
            const status = document.getElementById('t-status').value;
            const priority = document.getElementById('t-prio').value;
            try {
                if (editingId) {
                    const task = tasks.find(t => t.id === editingId);
                    const updated = { ...task, title, description: desc, status, priority };
                    await fetch(`/api/kanban/${editingId}`, { method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(updated) });
                    const i = tasks.findIndex(t => t.id === editingId);
                    if (i > -1) tasks[i] = updated;
                    showToast('Tarefa atualizada!', 'success');
                } else {
                    const newTask = { id: uid(), title, description: desc, status, priority };
                    const res = await fetch('/api/kanban', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(newTask) });
                    const created = await res.json();
                    tasks.push(created);
                    showToast('Tarefa criada!', 'success');
                }
                renderBoard(); closeTaskModal();
            } catch (e) { showToast('Erro ao salvar tarefa', 'error'); }
        }

        function confirmDelete(id) { deletingId = id; document.getElementById('confirm-modal').style.display = 'flex'; }
        function closeConfirm() { document.getElementById('confirm-modal').style.display = 'none'; deletingId = null; }
        async function executeDelete() {
            if (deletingId) {
                try {
                    await fetch(`/api/kanban/${deletingId}`, { method: 'DELETE' });
                    tasks = tasks.filter(t => t.id !== deletingId);
                    renderBoard(); showToast('Tarefa excluída', 'success');
                } catch (e) { showToast('Erro ao excluir tarefa', 'error'); }
            }
            closeConfirm();
        }

        // ── KEY SHORTCUT ───────────────────────────────────────────────────────────
        document.addEventListener('keydown', e => {
            if ((e.ctrlKey || e.metaKey) && e.key === 'n') { e.preventDefault(); openTaskModal(); }
            if (e.key === 'Escape') {
                document.getElementById('task-modal').style.display = 'none';
                document.getElementById('confirm-modal').style.display = 'none';
            }
        });

        // ── UTILS ──────────────────────────────────────────────────────────────────
        function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2); }
        function esc(s) { return String(s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;'); }
        function showToast(msg, type) {
            const t = document.getElementById('kb-toast'); t.textContent = msg;
            t.style.background = type === 'error' ? '#e11d48' : type === 'success' ? '#16a34a' : '#1e40af';
            t.style.display = 'block'; t.style.opacity = '1';
            clearTimeout(t._t); t._t = setTimeout(() => { t.style.opacity = '0'; setTimeout(() => t.style.display = 'none', 300); }, 3500);
        }

    </script>
</body>

</html>

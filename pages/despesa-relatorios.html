<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Relatórios – Dotações Orçamentárias</title>
  <link rel="stylesheet" href="/static/css/fonts.css" />
  <link rel="stylesheet" href="/static/css/index.css" />
  <link rel="stylesheet" href="/static/css/despesa-prefeitura.css" />
  <script defer src="/static/js/shared-header.js"></script>
  <style>
    /* ── Layout ─────────────────────────────────────────── */
    body { min-height: 100vh; }
    .rel-wrap { max-width: 1200px; margin: 0 auto; padding: 28px 24px 60px; }
    h2.section-title {
      font-size: 13px; font-weight: 700; letter-spacing: .08em; text-transform: uppercase;
      color: var(--muted); margin: 32px 0 14px; padding-bottom: 8px;
      border-bottom: 1px solid var(--line);
    }

    /* ── Cartões de períodos ─────────────────────────────── */
    .periodos-grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 14px;
    }
    .periodo-card {
      background: var(--surface); border: 1px solid var(--line); border-radius: 12px;
      padding: 16px 18px; cursor: pointer; transition: all .2s; position: relative;
    }
    .periodo-card:hover { border-color: var(--accent-2); background: rgba(201,169,97,.06); }
    .periodo-card.selected-a { border-color: #60a5fa; background: rgba(96,165,250,.08); }
    .periodo-card.selected-b { border-color: #34d399; background: rgba(52,211,153,.08); }
    .periodo-card .badge-a, .periodo-card .badge-b {
      position: absolute; top: 10px; right: 12px;
      font-size: 10px; font-weight: 700; padding: 2px 7px; border-radius: 20px;
    }
    .badge-a { background: rgba(96,165,250,.2); color: #60a5fa; }
    .badge-b { background: rgba(52,211,153,.2); color: #34d399; }
    .pc-periodo { font-size: 15px; font-weight: 700; color: var(--ink); }
    .pc-desc { font-size: 11px; color: var(--accent-2); margin-top: 2px; min-height: 14px; }
    .pc-meta { font-size: 11px; color: var(--muted); margin-top: 8px; }
    .pc-rows { font-size: 22px; font-weight: 800; color: var(--ink); margin-top: 6px; }
    .pc-rows span { font-size: 11px; font-weight: 400; color: var(--muted); }
    .pc-totais { margin-top: 10px; display: flex; flex-direction: column; gap: 4px; }
    .pc-total-item { display: flex; justify-content: space-between; font-size: 11px; }
    .pc-total-item .label { color: var(--muted); }
    .pc-total-item .value { color: var(--accent-2); font-weight: 600; }
    .pc-actions { display: flex; gap: 8px; margin-top: 14px; }
    .pc-btn {
      flex: 1; padding: 7px; border-radius: 7px; border: 1px solid var(--line);
      background: transparent; color: var(--ink); font-size: 11px; font-weight: 600;
      cursor: pointer; transition: all .2s; text-align: center;
    }
    .pc-btn:hover { background: rgba(255,255,255,.08); }
    .pc-btn-del { color: #ef4444; border-color: rgba(239,68,68,.3); }
    .pc-btn-del:hover { background: rgba(239,68,68,.1); }
    .pc-btn-ver { color: var(--accent-2); border-color: var(--accent-2); }
    .pc-spinner { font-size: 11px; color: var(--muted); text-align: center; padding: 20px; }

    /* ── Seleção para comparação ─────────────────────────── */
    .compare-bar {
      display: flex; align-items: center; gap: 16px; flex-wrap: wrap;
      background: var(--surface); border: 1px solid var(--line); border-radius: 10px;
      padding: 14px 18px; margin-bottom: 8px;
    }
    .compare-slot {
      flex: 1; min-width: 160px; padding: 10px 14px; border-radius: 8px;
      border: 2px dashed var(--line); text-align: center; font-size: 12px; color: var(--muted);
      transition: all .2s;
    }
    .compare-slot.filled-a { border-color: #60a5fa; color: #60a5fa; font-weight: 600; border-style: solid; }
    .compare-slot.filled-b { border-color: #34d399; color: #34d399; font-weight: 600; border-style: solid; }
    .compare-slot .slot-label { font-size: 10px; opacity: .7; display: block; margin-bottom: 2px; }
    #btn-comparar {
      padding: 10px 22px; border-radius: 8px; border: none;
      background: linear-gradient(135deg, var(--accent-1), var(--accent-2));
      color: #000; font-weight: 700; font-size: 13px; cursor: pointer; transition: opacity .2s;
    }
    #btn-comparar:disabled { opacity: .4; cursor: not-allowed; }
    #btn-limpar-sel {
      padding: 10px 14px; border-radius: 8px; border: 1px solid var(--line);
      background: transparent; color: var(--muted); font-size: 12px; cursor: pointer;
    }

    /* ── Resultado da comparação ─────────────────────────── */
    #resultado-comparacao { margin-top: 24px; }
    .comp-header {
      display: grid; grid-template-columns: 2fr 1fr 1fr 1fr; gap: 0;
      background: var(--surface); border: 1px solid var(--line); border-radius: 10px 10px 0 0;
      overflow: hidden;
    }
    .comp-header-cell {
      padding: 12px 16px; font-size: 12px; font-weight: 700; border-right: 1px solid var(--line);
    }
    .comp-header-cell:last-child { border-right: none; }
    .comp-header-cell.col-a { color: #60a5fa; }
    .comp-header-cell.col-b { color: #34d399; }
    .comp-header-cell.col-diff { color: var(--accent-2); }
    .comp-table { border: 1px solid var(--line); border-top: none; border-radius: 0 0 10px 10px; overflow: hidden; }
    .comp-row {
      display: grid; grid-template-columns: 2fr 1fr 1fr 1fr;
      border-bottom: 1px solid var(--line); transition: background .15s;
    }
    .comp-row:last-child { border-bottom: none; }
    .comp-row:hover { background: rgba(255,255,255,.04); }
    .comp-cell { padding: 10px 16px; font-size: 12px; border-right: 1px solid var(--line); }
    .comp-cell:last-child { border-right: none; }
    .comp-cell.label { color: var(--muted); font-weight: 600; }
    .comp-cell.val-a { color: #60a5fa; }
    .comp-cell.val-b { color: #34d399; }
    .comp-cell.val-diff { font-weight: 700; }
    .diff-pos { color: #f87171; }
    .diff-neg { color: #34d399; }
    .diff-zero { color: var(--muted); }

    /* ── Tabela de detalhes por secretaria ───────────────── */
    .detail-grid {
      display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 20px;
    }
    @media (max-width: 700px) { .detail-grid { grid-template-columns: 1fr; } }
    .detail-box {
      background: var(--surface); border: 1px solid var(--line); border-radius: 10px;
      overflow: hidden;
    }
    .detail-box-title {
      padding: 10px 16px; font-size: 11px; font-weight: 700; text-transform: uppercase;
      letter-spacing: .06em; color: var(--muted); border-bottom: 1px solid var(--line);
    }
    .detail-box-row {
      display: grid; grid-template-columns: 1fr 80px 80px 80px; font-size: 11px;
      border-bottom: 1px solid rgba(255,255,255,.04); padding: 7px 16px; gap: 8px;
    }
    .detail-box-row:last-child { border-bottom: none; }
    .detail-box-row:hover { background: rgba(255,255,255,.04); }
    .detail-box-row .dname { color: var(--ink); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .detail-box-row .da { color: #60a5fa; text-align: right; }
    .detail-box-row .db { color: #34d399; text-align: right; }
    .detail-box-row .dd { text-align: right; font-weight: 600; }
    .detail-box-header { color: var(--muted); font-weight: 700; }

    /* ── Barra de progresso ──────────────────────────────── */
    .bar-row { display: flex; align-items: center; gap: 8px; margin: 4px 0; font-size: 11px; }
    .bar-label { width: 160px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: var(--muted); }
    .bar-track { flex: 1; height: 6px; background: rgba(255,255,255,.06); border-radius: 3px; overflow: hidden; }
    .bar-fill { height: 100%; border-radius: 3px; }
    .bar-val { width: 100px; text-align: right; color: var(--accent-2); }

    /* ── Empty / loading ─────────────────────────────────── */
    .empty { text-align: center; padding: 60px 20px; color: var(--muted); font-size: 14px; }
    .loading { text-align: center; padding: 40px; color: var(--muted); font-size: 13px; }
  </style>
</head>
<body>
  <div class="bg-orb orb-a"></div>
  <div class="bg-orb orb-b"></div>

  <header class="hero">
    <div>
      <div class="brand">
        <a href="/" class="brand-back" title="Voltar ao início" style="display:flex;align-items:center;gap:0;text-decoration:none;">
          <img src="/static/img/brasao.png" alt="Brasão" class="brand-logo" />
        </a>
        <p class="kicker">Prefeitura Municipal de Inajá</p>
      </div>
      <h1>Relatórios de Dotações Orçamentárias</h1>
    </div>
    <div style="display:flex;align-items:center;gap:10px;">
      <a href="/pages/despesa-prefeitura.html" class="ghost" style="display:inline-flex;align-items:center;gap:6px;font-size:12px;text-decoration:none;padding:8px 14px;border-radius:8px;border:1px solid var(--line);color:var(--ink);">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        Importar CSV
      </a>
    </div>
  </header>

  <div class="rel-wrap">

    <!-- Períodos salvos -->
    <h2 class="section-title">📁 Períodos salvos no banco</h2>
    <div id="periodos-grid" class="periodos-grid">
      <div class="loading">Carregando períodos…</div>
    </div>

    <!-- Comparação -->
    <h2 class="section-title">⚖️ Comparar dois períodos</h2>
    <div class="compare-bar">
      <div id="slot-a" class="compare-slot">
        <span class="slot-label">PERÍODO A</span>
        Clique em um período para selecionar
      </div>
      <div id="slot-b" class="compare-slot">
        <span class="slot-label">PERÍODO B</span>
        Clique em um período para selecionar
      </div>
      <button id="btn-comparar" disabled>Comparar →</button>
      <button id="btn-limpar-sel">Limpar</button>
    </div>
    <div id="resultado-comparacao"></div>

  </div>

  <script>
  (() => {
    /* ── Estado ───────────────────────────────────────────── */
    let importacoes = [];
    let resumos = {};    // id → resumo
    let selA = null, selB = null;

    const fmt = v => {
      if (v == null || v === '') return '—';
      const n = typeof v === 'string'
        ? parseFloat(v.replace(/\./g,'').replace(',','.'))
        : v;
      if (isNaN(n)) return String(v);
      return n.toLocaleString('pt-BR', { style:'currency', currency:'BRL' });
    };
    const fmtN = v => typeof v === 'number' ? v.toLocaleString('pt-BR') : (v || '—');
    const escHtml = s => String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    const formatDate = dt => {
      if (!dt) return '';
      const d = new Date(dt.replace(' ','T'));
      return isNaN(d) ? dt : d.toLocaleString('pt-BR',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'});
    };

    /* ── Carrega lista de importações ─────────────────────── */
    async function carregarImportacoes() {
      const grid = document.getElementById('periodos-grid');
      try {
        const r = await fetch('/api/despesas/importacoes');
        importacoes = await r.json();
        if (!importacoes.length) {
          grid.innerHTML = `<div class="empty">Nenhum período salvo ainda.<br>Acesse o <a href="/pages/despesa-prefeitura.html" style="color:var(--accent-2)">Visualizador</a>, importe um CSV e clique em <strong>Salvar no banco</strong>.</div>`;
          return;
        }
        renderGrid();
        // Pré-carrega resumos
        importacoes.forEach(imp => carregarResumo(imp.id));
      } catch(e) {
        grid.innerHTML = `<div class="empty">Erro ao carregar períodos: ${e.message}</div>`;
      }
    }

    async function carregarResumo(id) {
      if (resumos[id]) return resumos[id];
      try {
        const r = await fetch(`/api/despesas/importacoes/${id}/resumo`);
        const data = await r.json();
        resumos[id] = data;
        // Atualiza o card
        const card = document.querySelector(`.periodo-card[data-id="${id}"]`);
        if (card) renderCardTotais(card, data);
        return data;
      } catch(e) {
        return null;
      }
    }

    /* ── Renderiza grid de períodos ───────────────────────── */
    function renderGrid() {
      const grid = document.getElementById('periodos-grid');
      grid.innerHTML = '';
      importacoes.forEach(imp => {
        const card = document.createElement('div');
        card.className = 'periodo-card';
        card.dataset.id = imp.id;
        card.innerHTML = `
          <div class="pc-periodo">${escHtml(imp.periodo)}</div>
          <div class="pc-desc">${escHtml(imp.descricao||'')}</div>
          <div class="pc-rows">${fmtN(imp.total_rows)} <span>registros</span></div>
          <div class="pc-meta">Importado em ${formatDate(imp.importado_em)}</div>
          <div class="pc-totais" id="totais-${imp.id}"><div class="pc-spinner">Calculando totais…</div></div>
          <div class="pc-actions">
            <button class="pc-btn pc-btn-ver" onclick="verPeriodo(${imp.id})">👁 Visualizar</button>
            <button class="pc-btn pc-btn-del" onclick="excluirPeriodo(${imp.id}, this)">🗑 Excluir</button>
          </div>`;
        card.addEventListener('click', e => {
          if (e.target.closest('button')) return;
          selecionarPeriodo(imp.id);
        });
        grid.appendChild(card);
      });
    }

    function renderCardTotais(card, data) {
      const el = card.querySelector('.pc-totais');
      if (!el) return;
      const totais = data.totais || {};
      const keys = Object.keys(totais);
      if (!keys.length) { el.innerHTML = ''; return; }
      el.innerHTML = keys.map(k =>
        `<div class="pc-total-item"><span class="label">${escHtml(k)}</span><span class="value">${fmt(totais[k])}</span></div>`
      ).join('');
    }

    /* ── Seleção para comparação ──────────────────────────── */
    function selecionarPeriodo(id) {
      const imp = importacoes.find(i => i.id === id);
      if (!imp) return;

      if (selA === id) { selA = null; }
      else if (selB === id) { selB = null; }
      else if (!selA) { selA = id; }
      else if (!selB) { selB = id; }
      else { selA = id; }  // substitui A

      atualizarSlots();
    }

    function atualizarSlots() {
      // Cards
      document.querySelectorAll('.periodo-card').forEach(c => {
        c.classList.remove('selected-a','selected-b');
        c.querySelector('.badge-a')?.remove();
        c.querySelector('.badge-b')?.remove();
      });
      const cA = selA && document.querySelector(`.periodo-card[data-id="${selA}"]`);
      const cB = selB && document.querySelector(`.periodo-card[data-id="${selB}"]`);
      if (cA) { cA.classList.add('selected-a'); cA.insertAdjacentHTML('beforeend','<div class="badge-a">A</div>'); }
      if (cB) { cB.classList.add('selected-b'); cB.insertAdjacentHTML('beforeend','<div class="badge-b">B</div>'); }

      // Slots
      const impA = selA && importacoes.find(i => i.id === selA);
      const impB = selB && importacoes.find(i => i.id === selB);
      const slotA = document.getElementById('slot-a');
      const slotB = document.getElementById('slot-b');
      slotA.className = 'compare-slot' + (selA ? ' filled-a' : '');
      slotA.innerHTML = `<span class="slot-label">PERÍODO A</span>${impA ? `<strong>${escHtml(impA.periodo)}</strong>${impA.descricao ? '<br><small>' + escHtml(impA.descricao) + '</small>' : ''}` : 'Clique em um período para selecionar'}`;
      slotB.className = 'compare-slot' + (selB ? ' filled-b' : '');
      slotB.innerHTML = `<span class="slot-label">PERÍODO B</span>${impB ? `<strong>${escHtml(impB.periodo)}</strong>${impB.descricao ? '<br><small>' + escHtml(impB.descricao) + '</small>' : ''}` : 'Clique em um período para selecionar'}`;

      document.getElementById('btn-comparar').disabled = !(selA && selB);
    }

    /* ── Comparação ───────────────────────────────────────── */
    document.getElementById('btn-comparar').addEventListener('click', async () => {
      if (!selA || !selB) return;
      const el = document.getElementById('resultado-comparacao');
      el.innerHTML = '<div class="loading">Calculando comparação…</div>';

      const [rA, rB] = await Promise.all([carregarResumo(selA), carregarResumo(selB)]);
      if (!rA || !rB) { el.innerHTML = '<div class="empty">Erro ao carregar dados para comparação.</div>'; return; }

      const impA = rA.importacao, impB = rB.importacao;
      const totA = rA.totais || {}, totB = rB.totais || {};

      // ── Métricas principais
      const metricas = [
        { label: 'Total de registros', a: impA.total_rows, b: impB.total_rows, money: false },
        ...Object.keys({...totA, ...totB}).map(k => ({ label: k, a: totA[k]||0, b: totB[k]||0, money: true }))
      ];

      let html = `
        <div class="comp-header">
          <div class="comp-header-cell">Métrica</div>
          <div class="comp-header-cell col-a">A · ${escHtml(impA.periodo)}</div>
          <div class="comp-header-cell col-b">B · ${escHtml(impB.periodo)}</div>
          <div class="comp-header-cell col-diff">Variação (A→B)</div>
        </div>
        <div class="comp-table">`;

      metricas.forEach(m => {
        const diff = (m.b||0) - (m.a||0);
        const pct  = m.a ? ((diff/m.a)*100).toFixed(1) : '—';
        const cls  = diff > 0 ? 'diff-pos' : diff < 0 ? 'diff-neg' : 'diff-zero';
        const sinal = diff > 0 ? '+' : '';
        const fval = m.money ? fmt : fmtN;
        html += `
          <div class="comp-row">
            <div class="comp-cell label">${escHtml(m.label)}</div>
            <div class="comp-cell val-a">${fval(m.a)}</div>
            <div class="comp-cell val-b">${fval(m.b)}</div>
            <div class="comp-cell val-diff ${cls}">${sinal}${m.money ? fmt(diff) : fmtN(diff)} ${pct !== '—' ? '(' + sinal + pct + '%)' : ''}</div>
          </div>`;
      });
      html += '</div>';

      // ── Detalhe por secretaria
      const secsA = rA.por_secretaria_valor || {};
      const secsB = rB.por_secretaria_valor || {};
      const saldoColLabel = rA.saldo_col || 'Saldo';
      const allSecs = [...new Set([...Object.keys(secsA), ...Object.keys(secsB)])];
      allSecs.sort((x,y) => ((secsB[y]||0)+(secsA[y]||0)) - ((secsB[x]||0)+(secsA[x]||0)));

      if (allSecs.length) {
        html += `<div class="detail-grid"><div class="detail-box">
          <div class="detail-box-title">📊 ${escHtml(saldoColLabel)} por Órgão/Secretaria</div>
          <div class="detail-box-row detail-box-header">
            <span>Órgão/Secretaria</span>
            <span class="da">A</span>
            <span class="db">B</span>
            <span class="dd">Variação</span>
          </div>`;
        const maxVal = Math.max(...allSecs.map(s => Math.max(secsA[s]||0, secsB[s]||0)), 1);
        allSecs.slice(0,20).forEach(sec => {
          const va = secsA[sec]||0, vb = secsB[sec]||0;
          const dv = vb - va;
          const cls = dv > 0 ? 'diff-pos' : dv < 0 ? 'diff-neg' : 'diff-zero';
          html += `<div class="detail-box-row">
            <span class="dname" title="${escHtml(sec)}">${escHtml(sec)}</span>
            <span class="da">${fmt(va)}</span>
            <span class="db">${fmt(vb)}</span>
            <span class="dd ${cls}">${dv>=0?'+':''}${fmt(dv)}</span>
          </div>`;
        });
        html += '</div>';

        // Barras para contagem por secretaria
        const cntA = rA.por_secretaria_contagem || {};
        const cntB = rB.por_secretaria_contagem || {};
        const allSecsCnt = [...new Set([...Object.keys(cntA), ...Object.keys(cntB)])];
        allSecsCnt.sort((x,y) => ((cntB[y]||0)+(cntA[y]||0)) - ((cntB[x]||0)+(cntA[x]||0)));
        const maxCnt = Math.max(...allSecsCnt.map(s => Math.max(cntA[s]||0, cntB[s]||0)), 1);

        html += `<div class="detail-box">
          <div class="detail-box-title">🔢 Qtd. de Empenhos por Órgão/Secretaria</div>`;
        allSecsCnt.slice(0,15).forEach(sec => {
          const va = cntA[sec]||0, vb = cntB[sec]||0;
          const wA = ((va/maxCnt)*100).toFixed(1), wB = ((vb/maxCnt)*100).toFixed(1);
          html += `<div style="padding:6px 16px;border-bottom:1px solid rgba(255,255,255,.04);">
            <div style="font-size:11px;color:var(--ink);margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;" title="${escHtml(sec)}">${escHtml(sec)}</div>
            <div class="bar-row"><div class="bar-track"><div class="bar-fill" style="width:${wA}%;background:#60a5fa;"></div></div><span style="font-size:10px;color:#60a5fa;min-width:30px;text-align:right">${va}</span></div>
            <div class="bar-row"><div class="bar-track"><div class="bar-fill" style="width:${wB}%;background:#34d399;"></div></div><span style="font-size:10px;color:#34d399;min-width:30px;text-align:right">${vb}</span></div>
          </div>`;
        });
        html += '</div></div>';
      }

      // ── Detalhe por função
      const funcA = rA.por_funcao || {}, funcB = rB.por_funcao || {};
      const allFunc = [...new Set([...Object.keys(funcA), ...Object.keys(funcB)])];
      allFunc.sort((x,y) => ((funcB[y]||0)+(funcA[y]||0)) - ((funcB[x]||0)+(funcA[x]||0)));
      if (allFunc.length) {
        const maxF = Math.max(...allFunc.map(s => Math.max(funcA[s]||0, funcB[s]||0)), 1);
        html += `<h2 class="section-title" style="margin-top:28px;">📂 Distribuição por Função</h2>
          <div style="background:var(--surface);border:1px solid var(--line);border-radius:10px;overflow:hidden;">`;
        allFunc.slice(0,15).forEach(func => {
          const va = funcA[func]||0, vb = funcB[func]||0;
          const wA = ((va/maxF)*100).toFixed(1), wB = ((vb/maxF)*100).toFixed(1);
          const dv = vb - va, cls = dv > 0 ? 'diff-pos' : dv < 0 ? 'diff-neg' : 'diff-zero';
          html += `<div style="padding:8px 16px;border-bottom:1px solid rgba(255,255,255,.04);display:grid;grid-template-columns:1fr 1fr 1fr 80px;gap:8px;align-items:center;">
            <div style="font-size:11px;color:var(--ink);">${escHtml(func)}</div>
            <div class="bar-row"><div class="bar-track"><div class="bar-fill" style="width:${wA}%;background:#60a5fa;"></div></div><span style="font-size:10px;color:#60a5fa;margin-left:6px;">${va}</span></div>
            <div class="bar-row"><div class="bar-track"><div class="bar-fill" style="width:${wB}%;background:#34d399;"></div></div><span style="font-size:10px;color:#34d399;margin-left:6px;">${vb}</span></div>
            <div style="font-size:11px;font-weight:700;" class="${cls}">${dv>=0?'+':''}${dv}</div>
          </div>`;
        });
        html += '</div>';
      }

      el.innerHTML = html;
    });

    document.getElementById('btn-limpar-sel').addEventListener('click', () => {
      selA = null; selB = null;
      atualizarSlots();
      document.getElementById('resultado-comparacao').innerHTML = '';
    });

    /* ── Ações de cards ───────────────────────────────────── */
    window.verPeriodo = id => {
      // Vai para o visualizador e carrega o período
      sessionStorage.setItem('despesa_carregar_id', id);
      location.href = '/pages/despesa-prefeitura.html';
    };

    window.excluirPeriodo = async (id, btn) => {
      if (!confirm('Excluir este período? Esta ação não pode ser desfeita.')) return;
      btn.disabled = true;
      try {
        await fetch(`/api/despesas/importacoes/${id}`, { method: 'DELETE' });
        importacoes = importacoes.filter(i => i.id !== id);
        if (selA === id) { selA = null; atualizarSlots(); }
        if (selB === id) { selB = null; atualizarSlots(); }
        renderGrid();
        importacoes.forEach(imp => carregarResumo(imp.id));
      } catch(e) {
        alert('Erro ao excluir: ' + e.message);
        btn.disabled = false;
      }
    };

    carregarImportacoes();
  })();
  </script>
</body>
</html>
